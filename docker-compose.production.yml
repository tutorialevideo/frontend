version: '3.8'

services:
  # MongoDB Local - pentru date firme (read-heavy)
  mongodb-local:
    image: mongo:7.0
    container_name: mfirme_mongodb_local
    environment:
      - MONGO_INITDB_DATABASE=mfirme_local
    ports:
      - "27017:27017"
    volumes:
      - mongodb_local_data:/data/db
    networks:
      - mfirme_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Optimize for read-heavy workload with 64GB RAM
    command: >
      mongod 
      --wiredTigerCacheSizeGB 32
      --setParameter diagnosticDataCollectionEnabled=false

  # Sync Service - sincronizează MongoDB Atlas → Local
  sync-service:
    build:
      context: ./sync-service
      dockerfile: Dockerfile
    container_name: mfirme_sync_service
    env_file:
      - .env
    environment:
      - MONGO_CLOUD_URL=${MONGO_URL}
      - MONGO_LOCAL_URL=mongodb://mongodb-local:27017/mfirme_local
      - SYNC_COLLECTIONS=firme,bilanturi,caen_codes,postal_codes,localities
      - PYTHONUNBUFFERED=1
    depends_on:
      mongodb-local:
        condition: service_healthy
    networks:
      - mfirme_network
    restart: unless-stopped
    volumes:
      - sync_logs:/app/logs
    ports:
      - "8002:8002"

  # Backend FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mfirme_backend
    env_file:
      - .env
    environment:
      - MONGO_LOCAL_URL=mongodb://mongodb-local:27017/mfirme_local
      - USE_LOCAL_DB=true
      - SYNC_SERVICE_URL=http://sync-service:8002
    ports:
      - "8001:8001"
    depends_on:
      mongodb-local:
        condition: service_healthy
      sync-service:
        condition: service_started
    networks:
      - mfirme_network
    restart: unless-stopped

  # Frontend React (via Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=
    container_name: mfirme_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - mfirme_network
    restart: unless-stopped

  # Redis pentru caching (opțional)
  redis:
    image: redis:7-alpine
    container_name: mfirme_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mfirme_network
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  mongodb_local_data:
    driver: local
  redis_data:
    driver: local
  sync_logs:
    driver: local

networks:
  mfirme_network:
    driver: bridge
